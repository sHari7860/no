{% extends "base.html" %}

{% block title %}Auditoría{% endblock %}

{% block content %}
<h1 class="mb-4">Logs</h1>
<div class="card border-0 shadow-sm rounded-4">

    <div class="card-body p-4">

        <!-- Filtros -->
        <div class="row g-3 mb-4">

            <div class="col-md-4">
                <label class="form-label fw-semibold">Usuario</label>
                <select id="filtroUsuario" class="form-select">
                    <option value="">Todos</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label fw-semibold">📅 Desde</label>
                <input type="datetime-local" id="filtroDesde" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-semibold">📅 Hasta</label>
                <input type="datetime-local" id="filtroHasta" class="form-control">
            </div>

        </div>

        <!-- Tabla -->
        <div class="table-responsive">
            <table class="table align-middle table-hover" id="tablaLogs">

                <thead class="table-light">
                    <tr>
                        <th>Usuario</th>
                        <th>Acción</th>
                        <th>Detalle</th>
                        <th>IP</th>
                        <th>Fecha</th>
                    </tr>
                </thead>

                <tbody id="cuerpoLogs">
                    <tr>
                        <td colspan="5" class="text-center py-4 text-muted">
                            <div class="spinner-border text-primary"></div>
                            <div class="mt-2">Cargando registros...</div>
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>

        <!-- Footer -->
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-3">

            <!-- Botones -->
            <div class="d-flex gap-2">
                <button id="prevPage" class="btn btn-outline-primary btn-sm rounded-pill">
                    ← Anterior
                </button>
                <button id="nextPage" class="btn btn-outline-primary btn-sm rounded-pill">
                    Siguiente →
                </button>
            </div>

            <!-- Indicador -->
            <div class="text-muted small">
                Página <strong id="paginaActual">1</strong> de 
                <strong id="totalPaginas">1</strong>
            </div>

        </div>

    </div>
</div>

<!-- Estilos extra -->
<style>
.card {
    transition: all 0.25s ease;
}
.card:hover {
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.table tbody tr:hover {
    background-color: rgba(13, 110, 253, 0.05);
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Construir arreglo de logs desde la variable Jinja
    const logsData = [
        {% for row in logs %}
        {
            user: "{{ (row[0] or '')|e }}",
            accion: "{{ (row[1] or '')|e }}",
            detalle: "{{ (row[2] or '')|e }}",
            ip: "{{ (row[3] or '')|e }}",
            fecha: "{{ row[4] }}"
        }{% if not loop.last %},{% endif %}
        {% endfor %}
    ];

    // Helpers para parsear fecha/tiempo en formato compatible
    function parseFecha(fechaStr) {
        if (!fechaStr) return null;
        let s = String(fechaStr).trim();
        // Manejar formatos con o sin microsegundos y con T o espacio
        s = s.replace(' ', 'T');
        s = s.split('.')[0];
        const d = new Date(s);
        if (!isNaN(d.getTime())) return d;
        // Intentar parseo más flexible
        const d2 = new Date(Date.parse(fechaStr));
        return isNaN(d2.getTime()) ? null : d2;
    }

    const pageSize = 10;
    let currentPage = 1;
    let filtered = logsData.slice();

    // Poblar select de usuarios
    function poblarUsuarios() {
        const users = [...new Set(logsData.map(l => (l.user || '').toString().trim()).filter(Boolean))].sort((a,b)=> a.localeCompare(b));
        const sel = document.getElementById('filtroUsuario');
        users.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u;
            opt.textContent = u;
            sel.appendChild(opt);
        });
    }

    function aplicarFiltros() {
        const usuarioRaw = document.getElementById('filtroUsuario').value || '';
        const usuario = usuarioRaw.toString().trim().toLowerCase();
        const desdeVal = document.getElementById('filtroDesde').value;
        const hastaVal = document.getElementById('filtroHasta').value;
        const desde = desdeVal ? new Date(desdeVal) : null;
        const hasta = hastaVal ? new Date(hastaVal) : null;

        filtered = logsData.filter(l => {
            if (usuario && l.user !== usuario) return false;
            const f = parseFecha(l.fecha);
            if (desde && (!f || f < desde)) return false;
            if (hasta && (!f || f > hasta)) return false;
            return true;
        });
        currentPage = 1;
        renderPage();
    }

    function formatFechaHora(fechaStr) {
        const d = parseFecha(fechaStr);
        if (!d) return '';
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');
        return `${y}-${m}-${day} ${hh}:${mm}:${ss}`;
    }

    function renderPage() {
        const tbody = document.getElementById('cuerpoLogs');
        tbody.innerHTML = '';
        const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
        document.getElementById('totalPaginas').textContent = totalPages;
        document.getElementById('paginaActual').textContent = currentPage;

        const start = (currentPage - 1) * pageSize;
        const pageItems = filtered.slice(start, start + pageSize);

        if (pageItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No hay registros para los filtros seleccionados</td></tr>';
            return;
        }

        pageItems.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${r.user}</td>
                <td>${r.accion}</td>
                <td>${r.detalle}</td>
                <td>${r.ip}</td>
                <td>${formatFechaHora(r.fecha)}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    document.getElementById('prevPage').addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; renderPage(); }
    });
    document.getElementById('nextPage').addEventListener('click', () => {
        const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
        if (currentPage < totalPages) { currentPage++; renderPage(); }
    });

    document.getElementById('filtroUsuario').addEventListener('change', aplicarFiltros);
    document.getElementById('filtroDesde').addEventListener('change', aplicarFiltros);
    document.getElementById('filtroHasta').addEventListener('change', aplicarFiltros);

    // Inicializar
    poblarUsuarios();
    filtered = logsData.slice();
    renderPage();
});
</script>
{% endblock %}
