{% extends "base.html" %}

{% block title %}Restablecer Contraseña{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 90vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
                
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Restablecer Contraseña</h3>
                    <p class="text-muted">Crea una nueva contraseña segura</p>
                </div>

                <form method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control" value="{{ username }}" disabled>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nueva Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" name="password" class="form-control" id="password" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <small class="text-muted d-block mt-2">
                            <i class="bi bi-info-circle"></i> Elige una contraseña segura con letras y números.
                        </small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Confirmar Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-check"></i>
                            </span>
                            <input type="password" name="password_confirm" class="form-control" id="password_confirm" placeholder="Repite tu contraseña" required>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg rounded-3">
                            Restablecer Contraseña
                        </button>
                    </div>

                    <div class="text-center">
                        <small class="text-muted">
                            <a href="{{ url_for('login') }}" class="text-decoration-none">Volver al login</a>
                        </small>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<script>
// Validación en tiempo real
const passwordInput = document.getElementById('password');
const confirmInput = document.getElementById('password_confirm');

function validarContraseñas() {
    if (passwordInput.value && confirmInput.value) {
        if (passwordInput.value === confirmInput.value) {
            confirmInput.classList.remove('is-invalid');
            confirmInput.classList.add('is-valid');
        } else {
            confirmInput.classList.remove('is-valid');
            confirmInput.classList.add('is-invalid');
        }
    }
}

passwordInput.addEventListener('input', validarContraseñas);
confirmInput.addEventListener('input', validarContraseñas);
</script>
{% endblock %}
